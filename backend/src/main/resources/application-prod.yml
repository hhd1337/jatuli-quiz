spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false

app:
  cors:
    allowed-origins: >
      https://jatuli.online,
      https://www.jatuli.online,
      https://jatuli-quiz-frontend.vercel.app,
      https://api.jatuli.online